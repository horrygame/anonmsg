<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База данных на Render</title>
</head>
<body>
    <h1>База данных</h1>
    <form id="dataForm">
        <label>Имя: <input type="text" id="name" required></label><br><br>
        <label>Телефон: <input type="tel" id="phone" required></label><br><br>
        <button type="submit">Добавить</button>
    </form>

    <h2>Записи</h2>
    <table id="recordsTable" border="1">
        <thead><tr><th>Имя</th><th>Телефон</th></tr></thead>
        <tbody></tbody>
    </table>

    <button onclick="downloadJSON()">Скачать базу данных (JSON)</button>

    <script>
        async function loadRecords() {
            const res = await fetch('/api/records');
            const records = await res.json();
            const tbody = document.querySelector('#recordsTable tbody');
            tbody.innerHTML = '';
            records.forEach(r => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${r.name}</td><td>${r.phone}</td>`;
                tbody.appendChild(row);
            });
        }

        document.getElementById('dataForm').onsubmit = async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            await fetch('/api/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone })
            });
            loadRecords();
            this.reset();
        };

        async function downloadJSON() {
            const res = await fetch('/api/records');
            const records = await res.json();
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records, null, 2));
            const a = document.createElement('a');
            a.setAttribute("href", dataStr);
            a.setAttribute("download", "database.json");
            a.click();
        }

        loadRecords();
    </script>
</body>
</html>
