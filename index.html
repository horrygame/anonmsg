<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База данных</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; }
        th { background-color: #f2f2f2; }
        button { margin-top: 10px; padding: 8px 12px; }
    </style>
</head>
<body>
    <h1>База данных</h1>
    <form id="dataForm">
        <label>Имя: <input type="text" id="name" required></label><br><br>
        <label>Телефон: <input type="tel" id="phone" required></label><br><br>
        <button type="submit">Добавить</button>
    </form>

    <h2>Записи</h2>
    <table id="recordsTable">
        <thead>
            <tr>
                <th>Имя</th>
                <th>Телефон</th>
            </tr>
        </thead>
        <tbody>
            <!-- Записи будут добавляться сюда -->
        </tbody>
    </table>

    <button onclick="downloadJSON()">Скачать базу данных (JSON)</button>

    <script>
        let records = [];

        document.getElementById('dataForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            records.push({name, phone});
            renderTable();
            this.reset();
        };

        function renderTable() {
            const tbody = document.querySelector('#recordsTable tbody');
            tbody.innerHTML = '';
            records.forEach((rec, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${rec.name}</td><td>${rec.phone}</td>`;
                tbody.appendChild(row);
            });
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "database.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    </script>
</body>
</html>
